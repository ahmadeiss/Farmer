version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: hasaad_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hasaad_db}
      POSTGRES_USER: ${POSTGRES_USER:-hasaad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hasaad_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hasaad}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hasaad_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hasaad_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hasaad_celery
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker -l info -Q default,notifications,transcription

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hasaad_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hasaad_frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}

volumes:
  postgres_data:
  media_files:
  static_files:
