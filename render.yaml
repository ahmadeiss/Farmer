# ============================================================
# Smart Hasaad — Render Blueprint
# Backend (Django) on Render free web service.
# Database lives on Supabase (free, no 90-day expiry).
# Media (product images) lives on Cloudinary (free 25 GB).
# Apply via: Render Dashboard → New → Blueprint → select this repo.
# ============================================================
services:
  - type: web
    name: hasaad-backend
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /api/docs/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: JWT_ACCESS_TOKEN_LIFETIME_MINUTES
        value: "60"
      - key: JWT_REFRESH_TOKEN_LIFETIME_DAYS
        value: "7"
      - key: OTP_PROVIDER
        value: mock
      - key: TRANSCRIPTION_SERVICE
        value: stub
      # ---- Secrets: set these in the Render dashboard, never commit ----
      - key: DATABASE_URL          # Supabase session pooler URL
        sync: false
      - key: CLOUDINARY_URL        # cloudinary://API_KEY:API_SECRET@CLOUD_NAME
        sync: false
      - key: CORS_ALLOWED_ORIGINS  # https://<your-vercel>.vercel.app
        sync: false
      - key: CSRF_TRUSTED_ORIGINS  # https://<your-vercel>.vercel.app
        sync: false
      - key: QR_CODE_BASE_URL      # https://<your-vercel>.vercel.app/orders/confirm
        sync: false

  # Daily cleanup: prune old read notifications + expired JWT blacklist rows.
  # Keeps the Supabase free 500 MB tier comfortable indefinitely.
  - type: cron
    name: hasaad-cleanup
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    schedule: "0 3 * * *"   # daily at 03:00 UTC
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py cleanup_old_data"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
